<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Teste de Estilo de Aprendizagem</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Descubra seu Estilo de Aprendizagem</h1>

<p class="sub">
Responda 16 perguntas rápidas e descubra como você aprende melhor.
</p>

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<div id="quiz"></div>

<div id="leadForm" style="display:none">

<h2>Veja seu resultado</h2>

<p>Informe seus dados para receber seu resultado.</p>

<input type="text" id="nome" placeholder="Seu nome">

<input type="email" id="email" placeholder="Seu email">

<input type="tel" id="whatsapp" placeholder="WhatsApp">

<select id="interesse">

<option>O que você deseja aprender?</option>
<option>Programação</option>
<option>Inglês</option>
<option>Marketing Digital</option>
<option>Concursos</option>
<option>Outro</option>

</select>

<button onclick="salvarLead()">Ver meu resultado</button>

</div>

<div id="resultado"></div>

</div>

<script src="script.js"></script>

</body>
</html>
