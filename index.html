<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Quiz + Lead</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Quiz de Aprendizagem</h1>
    <form id="leadForm">
      <h2>Dados Pessoais</h2>
      <input type="text" id="nome" placeholder="Nome" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="text" id="whatsapp" placeholder="WhatsApp" required>
      <input type="text" id="interesse" placeholder="Interesse" required>

      <h2>Quiz</h2>
      <p>Qual seu estilo de aprendizagem?</p>
      <label><input type="radio" name="pergunta1" value="Visual"> Visual</label>
      <label><input type="radio" name="pergunta1" value="Auditivo"> Auditivo</label>
      <label><input type="radio" name="pergunta1" value="Cinestésico"> Cinestésico</label>

      <p>Você prefere estudar em grupo ou sozinho?</p>
      <label><input type="radio" name="pergunta2" value="Grupo"> Grupo</label>
      <label><input type="radio" name="pergunta2" value="Sozinho"> Sozinho</label>

      <p>Qual horário você rende mais?</p>
      <label><input type="radio" name="pergunta3" value="Manhã"> Manhã</label>
      <label><input type="radio" name="pergunta3" value="Tarde"> Tarde</label>
      <label><input type="radio" name="pergunta3" value="Noite"> Noite</label>

      <button type="submit">Enviar</button>
    </form>

    <div id="mensagem"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
